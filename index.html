<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financiero</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --primary-color:    #5f2e0a;
    --secondary-color:  #A0522D;
    --accent-color:     #dec290;
    --background-color: #d1b684;
    --text-color:       #5D4037;
    --text-light:       #8D6E63;
    --white:            #FFFFFF;
    --success:          #6B8E23;
    --warning:          #A0522D;
    --danger:           #7B2D00;
    --info:             #8B7355;
    --surface:          #FFFFFF;
    --surface2:         #f5ead4;
    --border:           #dec290;
    --border-light:     #ecd9b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--background-color);
    color: var(--text-color);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── LOGIN OVERLAY ───────────────────────────────────────── */
  #loginOverlay {
    position: fixed;
    inset: 0;
    background: var(--background-color);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 24px;
  }
  #loginOverlay.hidden { display: none; }
  .login-card {
    background: var(--white);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 40px rgba(95,46,10,0.15);
    text-align: center;
  }
  .login-logo {
    width: 52px; height: 52px;
    background: var(--primary-color);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 1.5rem;
    color: var(--accent-color);
  }
  .login-card h2 {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--primary-color);
    margin-bottom: 4px;
  }
  .login-card p {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 28px;
  }
  .login-field {
    position: relative;
    margin-bottom: 14px;
    text-align: left;
  }
  .login-field label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .login-field input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-color);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .login-field input:focus { border-color: var(--secondary-color); background: var(--white); }
  .login-btn {
    width: 100%;
    padding: 12px;
    background: var(--primary-color);
    color: var(--accent-color);
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .login-btn:hover { background: var(--secondary-color); transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }
  .login-error {
    font-size: 0.75rem;
    color: var(--danger);
    background: rgba(123,45,0,0.08);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 12px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 36px; height: 36px;
    background: var(--primary-color);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-color);
    font-size: 1.1rem;
  }
  header h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--primary-color);
  }
  header h1 span { color: var(--secondary-color); font-weight: 400; }
  .header-badge {
    font-size: 0.73rem;
    color: var(--text-light);
    background: var(--surface2);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-weight: 500;
  }

  /* ── FILTERS ─────────────────────────────────────────────── */
  .filters {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    background: var(--surface);
    padding: 18px 22px;
    border-radius: 16px;
    border: 1px solid var(--border-light);
    box-shadow: 0 2px 12px rgba(95,46,10,0.07);
  }
  .filter-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 160px; }
  .filter-group label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text-light);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .filter-group label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-color);
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-light);
    font-size: 0.77rem;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    font-weight: 500;
  }
  .chip:hover {
    border-color: var(--secondary-color);
    color: var(--primary-color);
    background: #ede0c4;
    transform: translateY(-1px);
  }
  .chip.active {
    background: var(--primary-color);
    border-color: var(--primary-color);
    color: var(--accent-color);
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(95,46,10,0.25);
  }
  .chip.c-ventas.active    { background: var(--primary-color); border-color: var(--primary-color); }
  .chip.c-costo.active     { background: var(--danger);        border-color: var(--danger); }
  .chip.c-gastos.active    { background: var(--warning);       border-color: var(--warning); }
  .chip.c-resultado.active { background: var(--success);       border-color: var(--success); color: #fff; }
  .chip.c-period.active    { background: var(--info);          border-color: var(--info);    color: #fff; }

  /* ── KPIs ─────────────────────────────────────────────────── */
  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 2px 10px rgba(95,46,10,0.06);
  }
  .kpi:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(95,46,10,0.12);
  }
  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--kpi-color, var(--primary-color));
    border-radius: 16px 16px 0 0;
  }
  .kpi::after {
    content: '';
    position: absolute;
    right: -20px; top: -20px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--kpi-color, var(--primary-color));
    opacity: 0.05;
  }
  .kpi-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text-light);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .kpi-value {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .kpi-sub { font-size: 0.72rem; color: var(--text-light); margin-top: 6px; }
  .kpi-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.69rem;
    padding: 3px 8px;
    border-radius: 10px;
    margin-top: 8px;
    font-weight: 700;
  }
  .badge-up   { background: rgba(107,142,35,0.12); color: var(--success); }
  .badge-down { background: rgba(123,45,0,0.12);   color: var(--danger); }

  /* ── CARDS ────────────────────────────────────────────────── */
  .charts-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 2px 10px rgba(95,46,10,0.06);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .card-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-light);
    font-weight: 700;
  }
  .chart-wrap { position: relative; }

  /* ── CHART TOGGLE ─────────────────────────────────────────── */
  .chart-actions { display: flex; gap: 4px; }
  .chart-btn {
    padding: 4px 11px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-light);
    font-size: 0.71rem;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .chart-btn:hover { border-color: var(--secondary-color); color: var(--primary-color); }
  .chart-btn.active {
    background: var(--primary-color);
    border-color: var(--primary-color);
    color: var(--accent-color);
    font-weight: 600;
  }

  /* ── BOTTOM ROW ───────────────────────────────────────────── */
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ── TABLE ────────────────────────────────────────────────── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 14px;
    overflow-x: auto;
    box-shadow: 0 2px 10px rgba(95,46,10,0.06);
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    text-align: left;
    padding: 9px 14px;
    color: var(--text-light);
    font-weight: 700;
    font-size: 0.69rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    border-bottom: 2px solid var(--border-light);
    background: var(--surface2);
  }
  th:first-child { border-radius: 8px 0 0 8px; }
  th:last-child  { border-radius: 0 8px 8px 0; }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-light);
    color: var(--text-color);
    transition: background 0.1s;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(209,182,132,0.18); }
  td.neg  { color: var(--danger);  font-weight: 600; }
  td.pos  { color: var(--success); font-weight: 600; }
  td.bold { font-weight: 700; color: var(--primary-color); }

  /* ── RESPONSIVE ───────────────────────────────────────────── */
  @media (max-width: 900px) {
    body { padding: 16px; }
    .charts-grid { grid-template-columns: 1fr; }
    .bottom-row  { grid-template-columns: 1fr; }
    .kpis { grid-template-columns: repeat(2, 1fr); }
    header h1 { font-size: 1.1rem; }
  }
  @media (max-width: 480px) {
    .kpis { grid-template-columns: 1fr; }
    .filters { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">&#9783;</div>
    <h2>Cuadro de Resultado</h2>
    <p>Facore Ltda. — Acceso restringido</p>
    <div class="login-field">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="usuario" autocomplete="username" />
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError">Usuario o contraseña incorrectos</div>
    <div style="margin-top:20px;font-size:0.68rem;color:var(--text-light);opacity:0.7" id="loginVersion"></div>
  </div>
</div>

<header>
  <div class="header-left">
    <div class="header-icon">&#9783;</div>
    <h1>Cuadro de Resultado <span>/ Facore Ltda.</span></h1>
  </div>
  <span class="header-badge">Sep 2022 — Mar 2026</span>
</header>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-group">
    <label>Años</label>
    <div class="chips" id="yearChips"></div>
  </div>
  <div class="filter-group" style="min-width:200px">
    <label>Período rápido</label>
    <div class="chips" id="periodChips"></div>
  </div>
  <div class="filter-group">
    <label>Meses</label>
    <div class="chips" id="monthChips"></div>
  </div>
  <div class="filter-group">
    <label>Conceptos</label>
    <div class="chips" id="metricChips"></div>
  </div>
</div>

<!-- KPIs -->
<div class="kpis" id="kpis"></div>

<!-- MAIN CHART + DONUT -->
<div class="charts-grid">
  <div class="chart-card">
    <div class="card-header">
      <span class="card-title">Evolución mensual</span>
      <div class="chart-actions">
        <button class="chart-btn active" id="btnBar" onclick="setChartType('bar')">Barras</button>
        <button class="chart-btn" id="btnLine" onclick="setChartType('line')">Línea</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="mainChart" height="260"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="card-header">
      <span class="card-title">Composición promedio</span>
    </div>
    <div class="chart-wrap"><canvas id="donutChart" height="260"></canvas></div>
  </div>
</div>

<!-- BOTTOM ROW -->
<div class="bottom-row">
  <div class="chart-card">
    <div class="card-header">
      <span class="card-title">Resultado por año</span>
    </div>
    <div class="chart-wrap"><canvas id="yearChart" height="200"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="card-header">
      <span class="card-title">Margen resultado %</span>
    </div>
    <div class="chart-wrap"><canvas id="marginChart" height="200"></canvas></div>
  </div>
</div>

<!-- TABLE -->
<div class="table-card">
  <div class="card-header">
    <span class="card-title">Detalle mensual</span>
  </div>
  <table id="detailTable"></table>
</div>

<script>
// ─── VERSION ──────────────────────────────────────────────────────────────────
const VERSION = '01.01.000';

// ─── AUTH ─────────────────────────────────────────────────────────────────────
const USERS = {
  'facore': 'facore2024',
  'mario':  'facore2024',
};

function doLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginError');
  if (USERS[user] && USERS[user] === pass) {
    sessionStorage.setItem('fc_auth', '1');
    document.getElementById('loginOverlay').classList.add('hidden');
    err.classList.remove('show');
  } else {
    err.classList.add('show');
    document.getElementById('loginPass').value = '';
    document.getElementById('loginPass').focus();
  }
}

// Permitir Enter en los campos
document.addEventListener('DOMContentLoaded', () => {
  ['loginUser','loginPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
  // Si ya está autenticado en esta sesión, saltar login
  document.getElementById('loginVersion').textContent = 'v' + VERSION;
  if (sessionStorage.getItem('fc_auth') === '1') {
    document.getElementById('loginOverlay').classList.add('hidden');
  }
});

// ─── PALETTE ──────────────────────────────────────────────────────────────────
const P = {

const MONTHS_ORDER = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const ALL_YEARS    = [2022,2023,2024,2025,2026];

const PERIODS = [

const METRICS = [
  { key:'v', label:'Ventas Netas', cls:'c-ventas',    color: P.primary   },
  { key:'c', label:'Costo',        cls:'c-costo',     color: P.danger    },

// ─── STATE ────────────────────────────────────────────────────────────────────
let selYears   = new Set([2023,2024,2025,2026]);
let selMonths  = new Set(MONTHS_ORDER);
let selMetrics = new Set(['v','r']);
let selPeriod  = null; // null = meses libres
let chartType  = 'bar';

let mainChartInst, donutChartInst, yearChartInst, marginChartInst;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt     = n => { if(Math.abs(n)>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if(Math.abs(n)>=1e3) return '$'+(n/1e3).toFixed(0)+'K'; return '$'+n.toLocaleString('es-CL'); };
const fmtFull = n => (n<0?'-':'')+'$'+Math.abs(n).toLocaleString('es-CL');
const sum     = (rows, key) => rows.reduce((a,b) => a+b[key], 0);

const tooltipDefaults = {
  backgroundColor: P.surface,
  borderColor:     P.border,
  borderWidth:     1,
  titleColor:      P.primary,
  bodyColor:       P.textLight,
  padding:         10,
  cornerRadius:    8,
};

function getFiltered() {
  const rows = [];
  for (const year of ALL_YEARS) {
    if (!selYears.has(year)) continue;
    for (const mo of MONTHS_ORDER) {
      if (!selMonths.has(mo)) continue;
      if (!RAW[year][mo]) continue;
      rows.push({ year, mo, ...RAW[year][mo] });
    }
  }
  return rows;
}

// ─── CHIPS ───────────────────────────────────────────────────────────────────
function buildChips() {
  const yc = document.getElementById('yearChips');
  yc.innerHTML = '';
  ALL_YEARS.forEach(y => {
    const d = document.createElement('div');
    d.className = 'chip' + (selYears.has(y) ? ' active' : '');
    d.textContent = y;
    d.onclick = () => { if(selYears.has(y)&&selYears.size>1) selYears.delete(y); else selYears.add(y); buildChips(); refresh(); };
    yc.appendChild(d);
  });

  // Períodos rápidos
  const pc = document.getElementById('periodChips');
  pc.innerHTML = '';
  PERIODS.forEach(p => {
    const d = document.createElement('div');
    d.className = 'chip c-period' + (selPeriod === p.key ? ' active' : '');
    d.textContent = p.label;
    d.title = p.months.join(', ');
    d.onclick = () => {
      if (selPeriod === p.key) {
        selPeriod = null; // deselect → libera meses
        selMonths = new Set(MONTHS_ORDER);
      } else {
        selPeriod = p.key;
        selMonths = new Set(p.months);
      }
      buildChips(); refresh();
    };
    pc.appendChild(d);
  });

  const mc = document.getElementById('monthChips');
  mc.innerHTML = '';
  MONTHS_ORDER.forEach(m => {
    const d = document.createElement('div');
    d.className = 'chip' + (selMonths.has(m) ? ' active' : '');
    d.textContent = m;
    d.onclick = () => {
      selPeriod = null; // al tocar meses individualmente, se rompe el período
      if(selMonths.has(m)&&selMonths.size>1) selMonths.delete(m); else selMonths.add(m);
      buildChips(); refresh();
    };
    mc.appendChild(d);
  });

  const mec = document.getElementById('metricChips');
  mec.innerHTML = '';
  METRICS.forEach(m => {
    const d = document.createElement('div');
    d.className = 'chip ' + m.cls + (selMetrics.has(m.key) ? ' active' : '');
    d.textContent = m.label;
    d.onclick = () => { if(selMetrics.has(m.key)&&selMetrics.size>1) selMetrics.delete(m.key); else selMetrics.add(m.key); buildChips(); refresh(); };
    mec.appendChild(d);
  });
}

// ─── KPIs ─────────────────────────────────────────────────────────────────────
function buildKPIs(rows) {
  const totals = { v: sum(rows,'v'), c: sum(rows,'c'), g: sum(rows,'g'), r: sum(rows,'r') };
  const pct = k => totals.v > 0 ? ((totals[k]/totals.v)*100).toFixed(0)+'%' : '-';
  const kpiDefs = [
    { key:'v', color: P.primary,   sub: rows.length + ' períodos' },
    { key:'c', color: P.danger,    sub: pct('c') + ' sobre ventas' },
    { key:'g', color: P.warning,   sub: pct('g') + ' sobre ventas' },
    { key:'r', color: P.success,   sub: pct('r') + ' margen neto' },
  ];
  const el = document.getElementById('kpis');
  el.innerHTML = '';
  kpiDefs.forEach(k => {
    const v   = totals[k.key];
    const met = METRICS.find(m => m.key === k.key);
    const div = document.createElement('div');
    div.className = 'kpi';
    div.style.setProperty('--kpi-color', k.color);
    const badge = k.key === 'r'
      ? `<span class="kpi-badge ${v>=0?'badge-up':'badge-down'}">${v>=0?'▲':'▼'} ${Math.abs(parseFloat(pct('r')))}%</span>`
      : '';
    div.innerHTML = `
      <div class="kpi-label">${met.label}</div>
      <div class="kpi-value" style="color:${k.color}">${fmt(v)}</div>
      <div class="kpi-sub">${k.sub}</div>
      ${badge}
    `;
    el.appendChild(div);
  });
}

// ─── MAIN CHART ───────────────────────────────────────────────────────────────
function buildMainChart(rows) {
  const labels   = rows.map(r => r.mo + ' ' + String(r.year).slice(2));
  const datasets = METRICS
    .filter(m => selMetrics.has(m.key))
    .map(m => {
      // Para barras: cada barra puede tener color individual (negativo = rojo)
      const bgColors = chartType === 'bar'
        ? rows.map(r => r[m.key] < 0 ? P.danger + 'dd' : m.color + 'dd')
        : m.color + '1a';
      const bdColors = chartType === 'bar'
        ? rows.map(r => r[m.key] < 0 ? P.danger : m.color)
        : m.color;
      return {
        label:           m.label,
        data:            rows.map(r => r[m.key]),
        backgroundColor: bgColors,
        borderColor:     bdColors,
        borderWidth:     chartType==='line' ? 2.5 : 0,
        borderRadius:    chartType==='bar'  ? 5   : 0,
        fill:            chartType==='line',
        tension:         0.4,
        pointRadius:     chartType==='line' ? 3 : 0,
        pointHoverRadius: 5,
        pointBackgroundColor: chartType==='line'
          ? rows.map(r => r[m.key] < 0 ? P.danger : m.color)
          : m.color,
      };
    });

  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChartInst) mainChartInst.destroy();
  mainChartInst = new Chart(ctx, {
    type: chartType,
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { labels: { color: P.textLight, font:{size:11}, boxWidth:10, padding:14 } },
        tooltip: { ...tooltipDefaults, callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmtFull(ctx.raw) } }
      },
      scales: {
        x: { ticks:{color:P.textLight,font:{size:10}}, grid:{color:P.border+'33'} },
        y: { ticks:{color:P.textLight,font:{size:10}, callback: v=>fmt(v)}, grid:{color:P.border+'55'} }
      }
    }
  });
}

// ─── DONUT ────────────────────────────────────────────────────────────────────
function buildDonut(rows) {
  const tv = sum(rows,'v'), tc = sum(rows,'c'), tg = sum(rows,'g'), tr = sum(rows,'r');
  const ctx = document.getElementById('donutChart').getContext('2d');
  if (donutChartInst) donutChartInst.destroy();
  donutChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Costo','Gastos','Resultado'],
      datasets: [{
        data:            [tc, tg, Math.max(tr,0)],
        backgroundColor: [P.danger+'cc', P.warning+'cc', P.success+'cc'],
        borderColor:     P.bg,
        borderWidth:     4,
        hoverOffset:     8,
      }]
    },
    options: {
      responsive: true,
      cutout: '68%',
      plugins: {
        legend: { position:'bottom', labels:{color:P.textLight,font:{size:11},boxWidth:10,padding:16} },
        tooltip: { ...tooltipDefaults, callbacks: { label: ctx => ' '+ctx.label+': '+fmt(ctx.raw)+' ('+(tv>0?(ctx.raw/tv*100).toFixed(0):0)+'%)' } }
      }
    }
  });
}

// ─── YEAR BAR ─────────────────────────────────────────────────────────────────
function buildYearChart() {
  const years    = [...selYears].sort();
  const datasets = METRICS
    .filter(m => selMetrics.has(m.key))
    .map(m => ({
      label:           m.label,
      data:            years.map(y => Object.values(RAW[y]).reduce((a,b) => a+b[m.key], 0)),
      backgroundColor: m.color + 'cc',
      borderRadius:    6,
      borderWidth:     0,
    }));

  const ctx = document.getElementById('yearChart').getContext('2d');
  if (yearChartInst) yearChartInst.destroy();
  yearChartInst = new Chart(ctx, {
    type: 'bar',
    data: { labels: years.map(String), datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels:{color:P.textLight,font:{size:11},boxWidth:10,padding:12} },
        tooltip: { ...tooltipDefaults, callbacks: { label: ctx => ' '+ctx.dataset.label+': '+fmtFull(ctx.raw) } }
      },
      scales: {
        x: { ticks:{color:P.textLight,font:{size:11}}, grid:{color:P.border+'33'} },
        y: { ticks:{color:P.textLight,font:{size:10},callback: v=>fmt(v)}, grid:{color:P.border+'55'} }
      }
    }
  });
}

// ─── MARGIN LINE ──────────────────────────────────────────────────────────────
function buildMarginChart(rows) {
  const labels = rows.map(r => r.mo + ' ' + String(r.year).slice(2));
  const data   = rows.map(r => r.v > 0 ? parseFloat((r.r/r.v*100).toFixed(1)) : 0);
  const ctx    = document.getElementById('marginChart').getContext('2d');
  if (marginChartInst) marginChartInst.destroy();
  marginChartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Margen %',
        data,
        borderColor:    P.success,
        backgroundColor: (ctx) => {
          const g = ctx.chart.ctx.createLinearGradient(0,0,0,200);
          g.addColorStop(0, P.success+'44'); g.addColorStop(1, P.success+'00');
          return g;
        },
        borderWidth:         2.5,
        fill:                true,
        tension:             0.4,
        pointRadius:         3,
        pointBackgroundColor: d => d.raw < 0 ? P.danger : P.success,
        pointHoverRadius:    5,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { ...tooltipDefaults, callbacks: { label: ctx => ' Margen: '+ctx.raw+'%' } }
      },
      scales: {
        x: { ticks:{color:P.textLight,font:{size:10}}, grid:{color:P.border+'33'} },
        y: { ticks:{color:P.textLight,font:{size:10},callback: v=>v+'%'}, grid:{color:P.border+'55'} }
      }
    }
  });
}

// ─── TABLE ────────────────────────────────────────────────────────────────────
function buildTable(rows) {
  const t = document.getElementById('detailTable');
  const activeMetrics = METRICS.filter(m => selMetrics.has(m.key));
  let html = '<thead><tr><th>Período</th>';
  activeMetrics.forEach(m => html += `<th style="color:${m.color}">${m.label}</th>`);
  if (selMetrics.has('v') && selMetrics.has('r')) html += '<th>Margen</th>';
  html += '</tr></thead><tbody>';

  rows.forEach(r => {
    html += `<tr><td class="bold">${r.mo} ${r.year}</td>`;
    activeMetrics.forEach(m => {
      const v = r[m.key];
      html += `<td class="${m.key==='r'?(v<0?' neg':' pos'):''}">${fmtFull(v)}</td>`;
    });
    if (selMetrics.has('v') && selMetrics.has('r')) {
      const pct = r.v > 0 ? (r.r/r.v*100).toFixed(1) : '0';
      html += `<td class="${parseFloat(pct)<0?' neg':' pos'}">${pct}%</td>`;
    }
    html += '</tr>';
  });

  html += `<tr style="border-top:2px solid ${P.border}"><td class="bold" style="color:${P.textLight}">TOTAL</td>`;
  activeMetrics.forEach(m => {
    const total = sum(rows, m.key);
    html += `<td class="bold ${m.key==='r'?(total<0?' neg':' pos'):''}" style="color:${m.color}">${fmtFull(total)}</td>`;
  });
  if (selMetrics.has('v') && selMetrics.has('r')) {
    const tv=sum(rows,'v'), tr2=sum(rows,'r');
    const pct = tv>0?(tr2/tv*100).toFixed(1):0;
    html += `<td class="bold ${parseFloat(pct)<0?' neg':' pos'}">${pct}%</td>`;
  }
  html += '</tr></tbody>';
  t.innerHTML = html;
}

// ─── REFRESH ──────────────────────────────────────────────────────────────────
function refresh() {
  const rows = getFiltered();
  if (!rows.length) return;
  buildKPIs(rows);
  buildMainChart(rows);
  buildDonut(rows);
  buildYearChart();
  buildMarginChart(rows);
  buildTable(rows);
}

function setChartType(t) {
  chartType = t;
  document.getElementById('btnBar').classList.toggle('active', t==='bar');
  document.getElementById('btnLine').classList.toggle('active', t==='line');
  const rows = getFiltered();
  if (rows.length) buildMainChart(rows);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
Chart.defaults.color       = P.textLight;
Chart.defaults.borderColor = P.border;
buildChips();
refresh();
</script>
</body>
</html>
